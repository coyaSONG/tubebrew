name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      YOUTUBE_API_KEY: ci-placeholder
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder
      NEXT_PUBLIC_GOOGLE_REDIRECT_URI: http://localhost:3000/auth/callback
      OPENROUTER_API_KEY: ci-placeholder
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      LLM_MODEL: test/model
      REDIS_URL: redis://localhost:6379
      WEBSUB_CALLBACK_URL: http://localhost:3001/websub/callback
      WEBSUB_SECRET: ci-placeholder-ci-placeholder
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

